    <script>
      // Active nav highlight (fallback for html file)
      (function setActiveNav() {
        const currentPage = window.location.pathname.split('/').pop() || 'ppdb-schedule.php';
        document.querySelectorAll('a[data-nav]').forEach(link => {
          const href = link.getAttribute('data-nav');
          if (href === currentPage) {
            link.classList.add('bg-[#3d6625]', 'text-white');
            link.classList.remove('text-gray-700', 'hover:bg-[#f0f9eb]');
          } else {
            link.classList.remove('bg-[#3d6625]', 'text-white');
            link.classList.add('text-gray-700', 'hover:bg-[#f0f9eb]');
          }
        });
      })();

      // If wrapper injects admin name into window.__ADMIN_NAME__
      if (window.__ADMIN_NAME__) {
        const el = document.getElementById('admin-name');
        if (el) el.textContent = window.__ADMIN_NAME__;
      }

      async function loadPpdbSchedule() {
        const message = document.getElementById('schedule-message');
        if (message) {
          message.classList.add('hidden');
          message.classList.remove('text-red-600');
          message.classList.add('text-green-600');
        }

        try {
          const response = await fetch('../public/php/ppdb-schedule.php', { cache: 'no-store' });
          if (!response.ok) throw new Error('Tidak dapat memuat jadwal.');
          const data = await response.json();
          if (!Array.isArray(data.items)) throw new Error('Format jadwal tidak valid.');

          data.items.slice(0, 4).forEach((item, index) => {
            const title = document.getElementById(`schedule-title-${index}`);
            const detail = document.getElementById(`schedule-detail-${index}`);
            const status = document.getElementById(`schedule-status-${index}`);
            const active = document.getElementById(`schedule-active-${index}`);

            if (title) title.value = item.title || '';
            if (detail) detail.value = item.detail || '';
            if (status) status.value = item.status || '';
            if (active) active.checked = item.active === true || item.active === 'true';
          });
        } catch (error) {
          console.error(error);
          const message = document.getElementById('schedule-message');
          if (message) {
            message.textContent = 'Gagal memuat jadwal PPDB. Silakan coba lagi.';
            message.classList.remove('hidden');
            message.classList.remove('text-green-600');
            message.classList.add('text-red-600');
          }
        }
      }

      async function savePpdbSchedule(event) {
        event.preventDefault();
        const message = document.getElementById('schedule-message');
        if (message) {
          message.classList.remove('text-red-600');
          message.classList.add('text-green-600');
        }

        const items = [];
        for (let index = 0; index < 4; index++) {
          const title = document.getElementById(`schedule-title-${index}`).value.trim();
          const detail = document.getElementById(`schedule-detail-${index}`).value.trim();
          const status = document.getElementById(`schedule-status-${index}`).value.trim();
          const active = document.getElementById(`schedule-active-${index}`).checked;

          if (title && detail) {
            items.push({ title, detail, status, active });
          }
        }

        if (items.length === 0) {
          if (message) {
            message.textContent = 'Mohon isi minimal satu jadwal dengan nama kegiatan dan tanggal.';
            message.classList.remove('hidden');
            message.classList.remove('text-green-600');
            message.classList.add('text-red-600');
          }
          return;
        }

        try {
          const response = await fetch('../public/php/ppdb-schedule.php', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ items })
          });
          const result = await response.json();
          if (!response.ok || !result.success) {
            throw new Error(result.error || 'Gagal menyimpan jadwal.');
          }

          if (message) {
            message.textContent = 'Jadwal PPDB berhasil disimpan.';
            message.classList.remove('hidden');
            message.classList.remove('text-red-600');
            message.classList.add('text-green-600');
          }
        } catch (error) {
          console.error(error);
          if (message) {
            message.textContent = 'Error menyimpan jadwal. Silakan coba lagi.';
            message.classList.remove('hidden');
            message.classList.remove('text-green-600');
            message.classList.add('text-red-600');
          }
        }
      }

      document.getElementById('schedule-form').addEventListener('submit', savePpdbSchedule);
      document.addEventListener('DOMContentLoaded', loadPpdbSchedule);
    </script>

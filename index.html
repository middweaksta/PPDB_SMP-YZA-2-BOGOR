
  <!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMP YZA 2 Bogor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { height: 100%; margin: 0; }
    </style>
  </head>

  <body>
    <div class="min-h-screen bg-white">
      <!-- Header -->
      <header class="fixed inset-x-0 top-0 w-full bg-[#3d6625] py-3 px-6 flex items-center justify-between shadow-md z-50">
        <a href="html/index.html" class="flex items-center gap-3">
          <img src="https://www.upload.ee/image/19236257/BYZAD.png" alt="Logo SMP YZA 2 Bogor" class="w-12 h-12 rounded-full object-cover">
          <span class="text-white text-xl font-bold tracking-wide">SMP YZA 2 BOGOR</span>
        </a>

        <button id="hamburgerBtn" class="md:hidden text-white text-2xl focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>

        <nav class="hidden md:flex items-center gap-2" id="navMenu">
          <a href="index.html" class="nav-link px-5 py-2 rounded-lg transition-all text-white hover:bg-[#4a7c2c]">Home</a>
          <a href="tentang.html" class="nav-link px-5 py-2 rounded-lg transition-all text-white hover:bg-[#4a7c2c]">Tentang</a>
          <a href="visi-misi.html" class="nav-link px-5 py-2 rounded-lg transition-all text-white hover:bg-[#4a7c2c]">Visi & Misi</a>
          <a href="guru.html" class="nav-link px-5 py-2 rounded-lg transition-all text-white hover:bg-[#4a7c2c]">Guru</a>
          <a href="kontak.html" class="nav-link px-5 py-2 rounded-lg transition-all text-white hover:bg-[#4a7c2c]">Kontak</a>
          <div class="ml-4 h-8 w-px bg-white/30"></div>
          <a href="ppdb.html" class="px-5 py-2 bg-[#5a9a35] text-white rounded-lg hover:bg-[#6bb044] transition-all font-medium">PPDB</a>
          <a href="login-admin.html" class="px-5 py-2 bg-white/10 text-white rounded-lg hover:bg-white/20 transition-all border border-white/20">Login</a>
        </nav>
      </header>

      <nav id="mobileMenu" class="hidden absolute top-[68px] left-0 right-0 bg-[#2d4a1a] flex flex-col gap-2 px-4 py-4 md:hidden z-40">
        <a href="index.html" class="nav-link px-5 py-2 rounded-lg transition-all text-white hover:bg-[#4a7c2c]">Home</a>
        <a href="tentang.html" class="nav-link px-5 py-2 rounded-lg transition-all text-white hover:bg-[#4a7c2c]">Tentang</a>
        <a href="visi-misi.html" class="nav-link px-5 py-2 rounded-lg transition-all text-white hover:bg-[#4a7c2c]">Visi & Misi</a>
        <a href="guru.html" class="nav-link px-5 py-2 rounded-lg transition-all text-white hover:bg-[#4a7c2c]">Guru</a>
        <a href="kontak.html" class="nav-link px-5 py-2 rounded-lg transition-all text-white hover:bg-[#4a7c2c]">Kontak</a>
        <a href="ppdb.html" class="px-5 py-2 bg-[#5a9a35] text-white rounded-lg hover:bg-[#6bb044] transition-all font-medium">PPDB</a>
        <a href="login-admin.html" class="px-5 py-2 bg-white/10 text-white rounded-lg hover:bg-white/20 transition-all border border-white/20">Login</a>
      </nav>

      <!-- Hero Section -->
      <section class="relative h-screen flex items-center justify-center overflow-hidden bg-cover bg-center" style="background-image: url('https://www.upload.ee/image/19236259/byzad2.jpeg');">
        <div class="absolute inset-0 bg-black bg-opacity-50"></div>
        <div class="relative z-10 text-center text-white px-6">
          <h1 class="text-6xl font-bold mb-4 tracking-tight">SMP YZA 2 BOGOR</h1>
          <p class="text-lg font-light tracking-wide">BISSA</p>
          <p class="text-base mt-2 font-light">Bersih, Indah, Sehat, Sopan, Aman, dan Agamis. (BISSA)</p>
        </div>
      </section>

    </div>

    <script>
      // Set active nav link based on current page
      function setActiveNavLink() {
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        const navLinks = document.querySelectorAll('.nav-link');
        
        navLinks.forEach(link => {
          const href = link.getAttribute('href').split('/').pop();
          if (href === currentPage) {
            link.classList.add('bg-white', 'text-[#3d6625]', 'font-medium');
            link.classList.remove('text-white', 'hover:bg-[#4a7c2c]');
          } else {
            link.classList.remove('bg-white', 'text-[#3d6625]', 'font-medium');
            link.classList.add('text-white', 'hover:bg-[#4a7c2c]');
          }
        });
      }

      // Hamburger toggle for mobile
      document.addEventListener('DOMContentLoaded', function() {
        setActiveNavLink();

        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        if (hamburgerBtn && mobileMenu) {
          hamburgerBtn.addEventListener('click', function() {
            mobileMenu.classList.toggle('hidden');
          });

          mobileMenu.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') {
              mobileMenu.classList.add('hidden');
            }
          });
        }
      });
    </script>
  </body>
</html>
